<section class="ara-card" id="admin-events" data-admin-panel="tab-events tab-calendar">
  <div class="ara-card__header">
    <div>
      <p class="ara-eyebrow">Special Events</p>
      <h3 class="ara-card__title">Tournaments &amp; Make-Up Classes</h3>
    </div>
    <div class="ara-actions">
      <button type="button" class="btn-ghost" id="admin-events-refresh">↻ Refresh</button>
      <button type="button" class="btn-primary" id="admin-event-drawer-open">+ Add Event</button>
    </div>
  </div>
  <div class="admin-table-wrap">
    <table class="admin-table ara-table" aria-label="Special events">
      <thead>
        <tr>
          <th scope="col">Event</th>
          <th scope="col">Type</th>
          <th scope="col">Window</th>
          <th scope="col">Capacity</th>
          <th scope="col">Status</th>
          <th scope="col">Actions</th>
        </tr>
      </thead>
      <tbody id="admin-events-body">
        <tr><td colspan="6" class="ara-table__empty">No events yet. Click + Add Event to create one.</td></tr>
      </tbody>
    </table>
  </div>
  <p class="form-status" id="admin-events-status" aria-live="polite"></p>
</section>
