<section class="ara-card" id="admin-archive" data-admin-panel="tab-archive">
  <div class="ara-card__header">
    <div>
      <p class="ara-eyebrow">Archived Records</p>
      <h3 class="ara-card__title">Archived Students</h3>
    </div>
    <div class="ara-actions">
      <button type="button" class="btn-ghost" id="admin-archive-refresh">↻ Refresh</button>
    </div>
  </div>
  <div class="ara-info-banner ara-info-banner--warning">
    ⚠️  Archived students are removed from the active roster. Records are <strong>permanently deleted after 30 days</strong>.
  </div>
  <div class="admin-table-wrap">
    <table class="admin-table ara-table" aria-label="Archived students">
      <thead>
        <tr>
          <th scope="col">ARA ID</th>
          <th scope="col">Name</th>
          <th scope="col">Belt</th>
          <th scope="col">Archived On</th>
          <th scope="col">Days Left</th>
          <th scope="col">Reason</th>
        </tr>
      </thead>
      <tbody id="admin-archive-body">
        <tr><td colspan="6" class="ara-table__empty">Sign in and click Refresh to load archived students.</td></tr>
      </tbody>
    </table>
  </div>
  <p class="form-status" id="admin-archive-status" aria-live="polite"></p>
</section>
