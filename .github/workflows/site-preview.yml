name: Site Preview

on:
  pull_request:
    paths:
      - '*.html'
      - 'assets/**'
      - 'components/**'
      - 'panels/**'
      - 'js/**'
      - 'script.js'
      - 'style.css'
      - 'scripts/build.sh'
      - 'scripts/check-asset-sizes.sh'
      - 'scripts/check-public-secrets.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/site-preview.yml'

jobs:
  preview-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Scan for public secrets
        run: npm run check:public-secrets

      - name: Validate asset sizes
        run: npm run check:assets

      - name: Build static site
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-pr-${{ github.event.pull_request.number }}
          path: dist
          retention-days: 7

      - name: Add workflow summary
        run: |
          {
            echo "## Site Preview"
            echo ""
            echo "Built \`dist/\` for PR #${{ github.event.pull_request.number }}."
            echo "Download the \`site-preview-pr-${{ github.event.pull_request.number }}\` artifact from this workflow run to inspect the generated site."
          } >> "$GITHUB_STEP_SUMMARY"
