name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/worker/**'
      - '.github/workflows/deploy-worker.yml'

concurrency:
  group: deploy-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check deploy configuration
        id: deploy-config
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.deploy-config.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.deploy-config.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/worker/package-lock.json

      - name: Install Worker dependencies
        if: steps.deploy-config.outputs.enabled == 'true'
        run: npm ci
        working-directory: backend/worker

      - name: Run Worker tests
        if: steps.deploy-config.outputs.enabled == 'true'
        run: npm test
        working-directory: backend/worker

      - name: Deploy Worker to Cloudflare
        if: steps.deploy-config.outputs.enabled == 'true'
        run: npx wrangler deploy --config wrangler.jsonc
        working-directory: backend/worker

      - name: Explain skipped deploy
        if: steps.deploy-config.outputs.enabled != 'true'
        run: |
          {
            echo "## Worker deploy skipped"
            echo ""
            echo "Set \`CLOUDFLARE_API_TOKEN\` and \`CLOUDFLARE_ACCOUNT_ID\` repository secrets to enable automated Worker deployments."
          } >> "$GITHUB_STEP_SUMMARY"
