name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/worker/**'
      - '.github/workflows/deploy-worker.yml'

concurrency:
  group: deploy-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci
        working-directory: backend/worker

      - name: Run Worker tests
        run: npm test
        working-directory: backend/worker

      - name: Deploy Worker to Cloudflare
        run: npx wrangler deploy --config wrangler.jsonc
        working-directory: backend/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-disabled:
    if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Explain skipped deploy
        run: |
          {
            echo "## Worker deploy skipped"
            echo ""
            echo "Set \`CLOUDFLARE_API_TOKEN\` and \`CLOUDFLARE_ACCOUNT_ID\` repository secrets to enable automated Worker deployments."
          } >> "$GITHUB_STEP_SUMMARY"
